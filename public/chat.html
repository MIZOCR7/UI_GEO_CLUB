    }
    a, button, .burger-btn, .send-btn, .menu-cta-btn {

    .bg-grid {

      z-index: 0; pointer-events: none;
      background-image:

        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);

    }

    .logo-wrapper {
      position: fixed;
      top: 30px; left: 0;

      display: flex; justify-content: flex-start; align-items: center;

    .logo-wrapper .logo-inner { padding-left: 20px; }

    .burger-wrapper {
      position: fixed;
      top: 16px; right: 0;
      z-index: 10;

    }
    @media (min-width: 768px) { .burger-wrapper { top: 27px; } }
    .burger-wrapper .burger-inner { padding-right: 20px; }
    @media (min-width: 768px) { .burger-wrapper .burger-inner { padding-right: 40px; } }
    .burger-btn {
      width: 59px; height: 59px;
      border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; flex-direction: column; gap: 4px;
      align-items: center; justify-content: center;
      background: #F3E5D8; text-decoration: none;
      transition: background 0.3s ease;
    }
    .burger-btn span {
      display: block; width: 24px; height: 2px;
      background: #2B1B10; transition: all 0.3s ease;
    }
    .burger-btn:hover span:first-child { width: 16px; }
    .burger-btn:hover span:last-child  { width: 16px; }
    .burger-btn.active:hover span { width: 24px; }

    .hero-big-text {
      position: fixed;
      bottom: -30px; left: 0; right: 0;
      z-index: 2; pointer-events: none;

    }
    @media (min-width: 768px) { .hero-big-text { bottom: -40px; } }

    .chat-container {
      position: fixed; inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 90px 20px 100px;
    }

    .messages-area {
      flex: 1;
      width: 100%;
      max-width: 680px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;

    }
    .messages-area::-webkit-scrollbar { width: 4px; }

    .message {

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.ai { align-self: flex-start; }

    .message .avatar {

    }
    .message.user .avatar { background: #C29B6D; }
    .message.ai .avatar { background: #EAD8C3; }
    .message .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .message .bubble {

      border-radius: 18px;
      font-size: 15px;
      line-height: 1.65;

      letter-spacing: -0.005em;
    }

    .typing .bubble {
      display: flex; gap: 4px; align-items: center;
      padding: 18px 22px;
    }
    .typing .dot {
      width: 8px; height: 8px; border-radius: 50%;

      animation: dotPulse 1.2s infinite ease-in-out;
    }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }

    .welcome {

    .welcome p {

    .input-wrapper {

    .md-h3 {

      margin: 18px 0 8px; letter-spacing: -0.01em;

    .md-h2 {

    .md-em { font-style: italic; color: #5C4E43; }
    .md-highlight { color: #543B26; font-weight: 600; }
    .md-page {
      display: inline-block; background: #F3E5D8; color: #543B26;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      font-weight: 500; padding: 1px 8px; border-radius: 4px; letter-spacing: 0.01em;

    .md-list { margin: 8px 0; padding-left: 22px; list-style: none; }
    .md-list li { position: relative; margin-bottom: 5px; padding-left: 6px; line-height: 1.55; }

        <svg viewBox="0 0 18 18" fill="none">

  <script>
    /* ================================================================
       MENU TOGGLE
    ================================================================ */
    const menuToggle = document.getElementById("menu-toggle");
    const menuPanel  = document.getElementById("menu-panel");
    let menuOpen = false;

    menuToggle.addEventListener("click", () => {
      menuOpen = !menuOpen;
      menuPanel.classList.toggle("open", menuOpen);
      menuToggle.classList.toggle("active", menuOpen);
      menuToggle.setAttribute("aria-label", menuOpen ? "Close menu" : "Open menu");
      if (menuOpen) {
        menuToggle.style.background = "#1C110A";
        menuToggle.querySelector("span:first-child").style.background  = "#F3E5D8";
        menuToggle.querySelector("span:first-child").style.transform   = "rotate(45deg) translateY(3px)";
        menuToggle.querySelector("span:last-child").style.background   = "#F3E5D8";
        menuToggle.querySelector("span:last-child").style.transform    = "rotate(-45deg) translateY(-3px)";
      } else {
        menuToggle.style.background = "#F3E5D8";
        menuToggle.querySelector("span:first-child").style.background  = "#2B1B10";
        menuToggle.querySelector("span:first-child").style.transform   = "none";
        menuToggle.querySelector("span:last-child").style.background   = "#2B1B10";
        menuToggle.querySelector("span:last-child").style.transform    = "none";
      }
    });

    function closeMenu() {
      if (menuOpen) menuToggle.click();
    }

    /* ================================================================
       API ENDPOINTS — calls Vercel proxy (no CORS issues)
    ================================================================ */
    const HF_SPACE   = "https://miaaiassistant-geology-professor.hf.space";
    const CHAT_API   = HF_SPACE + "/api/chat?message=";
    const HEALTH_API = HF_SPACE + "/api/health";

    /* ================================================================
       FETCH WITH TIMEOUT (AbortController)
    ================================================================ */
    function fetchWithTimeout(url, ms) {
      const ctrl  = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), ms);
      return fetch(url, { signal: ctrl.signal })
        .finally(() => clearTimeout(timer));
    }

    /* ================================================================
       CALL BACKEND — via Vercel proxy (server-to-server, no CORS)
    ================================================================ */
    async function callBackend(message) {
      const target = CHAT_API + encodeURIComponent(message);

      const statusSteps = ["Waking up the AI professor...", "Searching the textbook...", "Still thinking...", "Almost there..."];
      let step = 0;
      const statusTimer = setInterval(() => {
        step = Math.min(step + 1, statusSteps.length - 1);
        setStatus(statusSteps[step]);
      }, 15000);

      try {
        const r = await fetchWithTimeout(target, 180000);
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || "request_failed");
        return j.response;
      } finally {
        clearInterval(statusTimer);
      }
    }

    /* ================================================================
       RESPONSE PARSER
       The Vercel proxy now returns clean AI text (no HTML wrapping).
       This is just a safety net for edge cases.
    ================================================================ */
    function extractReply(raw) {
      if (!raw || !raw.trim()) return null;

      // Already clean text from Vercel proxy — return as-is
      if (!raw.startsWith("{") && !raw.startsWith("<")) return raw.trim();

      // Fallback: try to parse as JSON
      try {
        const d = JSON.parse(raw);
        return d.response || d.reply || d.answer || d.message || d.text || raw.trim();
      } catch {}

      // Last resort: strip any HTML tags
      return raw.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
    }

    /* ================================================================
       MARKDOWN RENDERER
    ================================================================ */
    function renderMarkdown(text) {
      text = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
      text = text.replace(/\[Page\s*(\d+(?:[\s-]+\d+)?)\]/gi, m => `<span class="md-page">${m}</span>`);
      text = text.replace(/\[Source:\s*([^\]]+)\]/gi, m => ` <span class="md-page">${m}</span>`);

      const lines = text.split("\n");
      let html = "", i = 0;

      while (i < lines.length) {
        const t = lines[i].trim();
        if (t.startsWith("### ")) { html += `<div class="md-h3">${inline(t.slice(4))}</div>`; i++; }
        else if (t.startsWith("## "))  { html += `<div class="md-h2">${inline(t.slice(3))}</div>`; i++; }
        else if (t === "---" || t === "***") { html += `<hr class="md-divider" />`; i++; }
        else if (t.startsWith("- ") || t.startsWith("* ")) {
          const items = [];
          while (i < lines.length && (lines[i].trim().startsWith("- ") || lines[i].trim().startsWith("* "))) {
            items.push(inline(lines[i].trim().slice(2))); i++;
          }
          html += `<ul class="md-list">${items.map(it => `<li>${it}</li>`).join("")}</ul>`;
        }
        else if (/^\d+[.)]\s/.test(t)) {
          const items = [];
          while (i < lines.length && /^\d+[.)]\s/.test(lines[i].trim())) {
            items.push(inline(lines[i].trim().replace(/^\d+[.)]\s/, ""))); i++;
          }
          html += `<ol class="md-ol">${items.map(it => `<li>${it}</li>`).join("")}</ol>`;
        }
        else if (t === "") { i++; }
        else { html += `<div class="md-p">${inline(t)}</div>`; i++; }
      }
      return html;
    }

    function inline(text) {
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong class="md-strong">$1</strong>');
      text = text.replace(/\*(.+?)\*/g,     '<em class="md-em">$1</em>');
      text = text.replace(/`([^`]+)`/g,     '<code class="md-page">$1</code>');
      const geo = /\b(igneous|sedimentary|metamorphic|magma|lava|erosion|weathering|fossil|mineral|crystal|tectonic|strata|sediment|mantle|crust|core|fault|fold|quake|magmatic|deposit|bedrock|ore|gem)\b/gi;
      return text.replace(geo, '<span class="md-highlight">$1</span>');
    }

    /* ================================================================
       CHAT UI
    ================================================================ */
    const messagesEl = document.getElementById("messages");
    const welcomeEl  = document.getElementById("welcome");
    const form       = document.getElementById("chat-form");
    const inputEl    = document.getElementById("chat-input");
    const sendBtn    = document.getElementById("send-btn");
    let history = [];

    function addMessage(role, text) {
      welcomeEl.style.display = "none";
      const wrap   = document.createElement("div");
      wrap.className = `message ${role}`;
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.innerHTML = `<img src="/hero.png" alt="" />`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      if (role === "ai") bubble.innerHTML = renderMarkdown(text);
      else bubble.textContent = text;
      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "message ai typing";
      div.id = "typing-indicator";
      div.innerHTML = `
        <div class="avatar"><img src="/hero.png" alt="" /></div>
        <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      `;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing-indicator");
      if (el) el.remove();
    }

    function setStatus(text) {
      const el = document.getElementById("typing-indicator");
      if (!el) return;
      const b = el.querySelector(".bubble");
      if (b) b.innerHTML = `<span style="font-size:13px;color:#8B7D72;font-family:'Inter',sans-serif;">${text}</span>`;
    }

    /* ================================================================
       SEND MESSAGE
    ================================================================ */
    async function sendMessage(text) {
      text = text.trim();
      if (!text) return;
      inputEl.value = "";
      sendBtn.disabled = true;

      addMessage("user", text);
      history.push({ role: "user", content: text });
      showTyping();

      try {
        const raw   = await callBackend(text);
        const reply = extractReply(raw);
        removeTyping();
        addMessage("ai", reply || "I got a response but couldn't read the answer. Please try again.");
        history.push({ role: "ai", content: reply || "" });
      } catch {
        removeTyping();
        addMessage("ai", "Could not reach the backend. Please try again in a moment.");
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    form.addEventListener("submit", e => { e.preventDefault(); sendMessage(inputEl.value); });
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
    });

    // Silently warm up the backend on page load
    (async () => { try { await fetchWithTimeout(HEALTH_API, 30000); } catch {} })();
  </script>
</body>
</html>
